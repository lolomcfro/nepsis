name: CI

on:
  pull_request:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Check Kotlin formatting (ktlint)
        working-directory: android
        run: ./gradlew ktlintCheck
      - name: Run Android unit tests
        working-directory: android
        run: ./gradlew test
      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: sober-admin-apk
          path: android/app/build/outputs/apk/release/app-release.apk

  desktop:
    runs-on: ubuntu-latest
    needs: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: sober-admin-apk
          path: desktop/assets/
      - name: Place APK
        run: mv desktop/assets/app-release.apk desktop/assets/sober-admin.apk
      - uses: actions/setup-go@v5
        with:
          go-version-file: desktop/go.mod
      - name: Check Go formatting (gofmt)
        run: |
          if [ -n "$(cd desktop && gofmt -l .)" ]; then
            echo "Go code is not formatted. Run: gofmt -w ./desktop"
            cd desktop && gofmt -l .
            exit 1
          fi
      - name: Run Go tests
        working-directory: desktop
        run: go test ./...
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend dependencies
        working-directory: desktop/frontend
        run: npm ci
      - name: Check frontend formatting (Prettier)
        working-directory: desktop/frontend
        run: npx prettier --check .
      - name: Install system dependencies
        run: sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
      - name: Build desktop app
        working-directory: desktop
        run: wails build
      - uses: actions/upload-artifact@v4
        with:
          name: nepsis-linux
          path: desktop/build/bin/nepsis
